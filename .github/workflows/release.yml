name: Release

# Build, sign, notarize and publish a ClaudeBar release entirely in CI, so a
# release can be cut from anywhere (including Claude Code on the web) without a
# local Mac. Bump the version in pubspec.yaml first, push it, then run this
# workflow — it reads the version from pubspec.yaml, ships the DMG + Sparkle zip
# as a GitHub release, and prepends the appcast item that drives in-app updates.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   MACOS_CERT_P12        base64 of the "Developer ID Application" .p12 export
#   MACOS_CERT_PASSWORD   password used when exporting that .p12
#   APPLE_ID              Apple ID email used for notarization
#   APPLE_TEAM_ID         10-char Apple Developer Team ID
#   APPLE_APP_PASSWORD    app-specific password for that Apple ID (notarytool)
#   SPARKLE_PRIVATE_KEY   the EdDSA private key (contents of `generate_keys -x`)

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes — Markdown bullet lines (one per line, '- …')"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from pubspec.yaml
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version: \([0-9.]*\).*/\1/p' pubspec.yaml)"
          BUILD="$(sed -n 's/^version: [0-9.]*+\([0-9]*\).*/\1/p' pubspec.yaml)"
          if [[ -z "$VERSION" || -z "$BUILD" ]]; then
            echo "::error::Could not parse 'version: X.Y.Z+N' from pubspec.yaml"; exit 1
          fi
          CHANNEL="${{ github.event.inputs.channel }}"
          # Beta releases get a distinct, prerelease tag keyed on the build
          # number (which must strictly increase), so several betas can share an
          # X.Y.Z without colliding; stable keeps the plain vX.Y.Z tag.
          if [[ "$CHANNEL" == "beta" ]]; then
            TAG="v${VERSION}-beta.${BUILD}"
            PRERELEASE="true"
          else
            TAG="v${VERSION}"
            PRERELEASE="false"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists — bump the pubspec build number first."; exit 1
          fi
          {
            echo "version=$VERSION"
            echo "build=$BUILD"
            echo "tag=$TAG"
            echo "channel=$CHANNEL"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (build $BUILD, channel $CHANNEL)"

      - name: Install Flutter (fvm, pinned by .fvmrc)
        run: |
          set -euo pipefail
          brew tap leoafarias/fvm
          brew install fvm
          fvm install
          fvm flutter --version

      - name: flutter pub get
        run: fvm flutter pub get

      # The Podfile post-install hook reads FlutterMacOS.xcframework from the
      # engine cache; without precache it isn't there yet and pod install aborts.
      - name: flutter precache (macOS engine artifacts)
        run: fvm flutter precache --macos

      - name: pod install (provides Sparkle's sign_update)
        run: cd macos && pod install

      - name: Set up signing keychain + notary credentials
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KCPW="$(openssl rand -base64 24)"

          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no auto-lock mid-build
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          # Make this the one keychain everything resolves to (codesign identity
          # lookup + notarytool profile read both search the default list).
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

          # Developer ID Application certificate.
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Notary credentials under the profile name release_dmg.sh expects.
          xcrun notarytool store-credentials claudebar-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --keychain "$KEYCHAIN"

          # Sparkle signs the update zip from a key FILE (not the Keychain) so it
          # stays non-interactive in CI; release_dmg.sh picks up SPARKLE_KEY_FILE.
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle.key"

      - name: Build, sign, notarize, package (rps ship equivalent)
        id: ship
        env:
          SPARKLE_KEY_FILE: ${{ runner.temp }}/sparkle.key
        run: |
          set -euo pipefail
          scripts/release_dmg.sh 2>&1 | tee "$RUNNER_TEMP/ship.log"
          SIG_LINE="$(grep -Eo 'sparkle:edSignature="[^"]+" length="[0-9]+"' "$RUNNER_TEMP/ship.log" | tail -1)"
          if [[ -z "$SIG_LINE" ]]; then
            echo "::error::sign_update did not emit an edSignature/length line"; exit 1
          fi
          ED="$(echo "$SIG_LINE" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')"
          LEN="$(echo "$SIG_LINE" | sed -n 's/.*length="\([0-9]*\)".*/\1/p')"
          echo "edsig=$ED" >> "$GITHUB_OUTPUT"
          echo "length=$LEN" >> "$GITHUB_OUTPUT"

      - name: Clean up the Sparkle key file
        if: always()
        run: rm -f "$RUNNER_TEMP/sparkle.key"

      - name: Publish GitHub release (DMG + Sparkle zip)
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ github.event.inputs.notes }}
          V: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
          PRERELEASE: ${{ steps.ver.outputs.prerelease }}
        run: |
          set -euo pipefail
          # The DMG/zip are named by the marketing version; the tag may carry a
          # -beta suffix, so they can differ.
          TITLE="ClaudeBar $V"
          PRE_FLAG=()
          if [[ "$PRERELEASE" == "true" ]]; then
            TITLE="ClaudeBar $V (beta)"
            PRE_FLAG=(--prerelease)
          fi
          gh release create "$TAG" \
            "build/dist/ClaudeBar-$V.dmg" "build/dist/ClaudeBar-$V.zip" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes "$NOTES" \
            "${PRE_FLAG[@]}"

      - name: Update appcast and push
        env:
          NOTES: ${{ github.event.inputs.notes }}
          V: ${{ steps.ver.outputs.version }}
          BUILD: ${{ steps.ver.outputs.build }}
          TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
          EDSIG: ${{ steps.ship.outputs.edsig }}
          LENGTH: ${{ steps.ship.outputs.length }}
        run: |
          set -euo pipefail
          prepend() {
            python3 scripts/update_appcast.py \
              --version "$V" --build "$BUILD" --edsig "$EDSIG" --length "$LENGTH" \
              --tag "$TAG" --appcast "$1"
          }
          # Beta builds land only in the beta feed; stable builds go to both, so
          # beta testers keep receiving stable releases over the beta channel.
          if [[ "$CHANNEL" == "beta" ]]; then
            prepend appcast-beta.xml
            FILES=(docs/appcast-beta.xml)
          else
            prepend appcast.xml
            prepend appcast-beta.xml
            FILES=(docs/appcast.xml docs/appcast-beta.xml)
          fi
          git add "${FILES[@]}"
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to push"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: appcast for $TAG"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Summary
        if: success()
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          {
            echo "### Released ClaudeBar $TAG :rocket:"
            echo
            echo "- Channel: ${{ steps.ver.outputs.channel }}"
            echo "- Release: https://github.com/beerbeatbox/claudebar/releases/tag/$TAG"
            echo "- Appcast updated — existing installs will see the update on their next check."
          } >> "$GITHUB_STEP_SUMMARY"
